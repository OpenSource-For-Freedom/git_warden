name: The Warden
on:
  workflow_dispatch:
    inputs:
      reconcile:
        description: "Prune the registry before publishing: reject confirmed findings lacking static evidence or under a known-good org"
        type: boolean
        default: false
  schedule:
    - cron: "0 13 * * 1" # Mondays 13:00 UTC (~9am US-Eastern); weekly batch (PRD 8)

permissions:
  contents: read

concurrency:
  group: git-warden-run
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Legion Harden Runner
        uses: OpenSource-For-Freedom/Legion_runner@v1.0.41
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e . semgrep guarddog

      - name: Restore data
        uses: actions/cache@v4
        with:
          path: data
          key: git-warden-data-${{ github.run_id }}
          restore-keys: git-warden-data-

      - name: Reconcile registry (prune unproven / known-good before this run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.reconcile }}
        run: python gw.py review --reconcile

      - name: Ingest threat-intel breadcrumbs
        env:
          GW_GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GW_OSM_API_KEY: ${{ secrets.OSM_KEY }}
          GW_OSM_BASE_URL: ${{ secrets.GW_OSM_BASE_URL }}
        run: python gw.py ingest

      - name: Hunt malicious repositories (Tier-2 + gold)
        env:
          GW_GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GW_OSM_API_KEY: ${{ secrets.OSM_KEY }}
          GW_OSM_BASE_URL: ${{ secrets.GW_OSM_BASE_URL }}
          GW_DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

        # Top 75 candidates per weekly run (ranked by signature/owner/signal
        # priority), not every possible repo. Keeps the run well inside the
        # timeout; each week surfaces the next batch of new finds.
        run: python gw.py hunt --scan --gold --limit 75

      - name: Publish registry table to README
        if: always()
        run: |
          git config user.name "git-warden[bot]"
          git config user.email "git-warden@users.noreply.github.com"
          if git diff --quiet -- README.md; then
            echo "README registry unchanged; nothing to push."
            exit 0
          fi
          git add README.md
          git commit -m "Auto-update malicious-repo registry table [skip ci]"
          # The hunt step runs ~45 min, so main may have advanced since checkout
          # (or this is a re-run pinned to an older SHA). Rebase our commit onto
          # the live tip FIRST and only push if the rebase is clean; loop to
          # absorb a push that races with another update.
          pushed=false
          for attempt in 1 2 3 4 5; do
            git fetch origin "${GITHUB_REF_NAME}"
            if ! git rebase --autostash "origin/${GITHUB_REF_NAME}"; then
              git rebase --abort 2>/dev/null || true
              echo "::error::README registry rebase conflicted with origin/${GITHUB_REF_NAME}; manual merge needed."
              exit 1
            fi
            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              echo "Registry update pushed (attempt ${attempt})."
              pushed=true
              break
            fi
            echo "Push raced with another update; refetching and rebasing (attempt ${attempt})."
          done
          if [ "$pushed" != true ]; then
            echo "::error::Could not push README registry update after 5 attempts."
            exit 1
          fi

      - name: Upload run artifacts (full transparency)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: git-warden-artifacts
          path: artifacts/
          if-no-files-found: ignore

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Legion Harden Runner
        uses: OpenSource-For-Freedom/Legion_runner@v1.0.41
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests gw.py
      - name: Test
        run: pytest -q

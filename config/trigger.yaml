# Git Warden error playbook (doc 05 section 5.2).
# Classify each error, choose a self-healing response, reinitiate work. Each
# class has its own behavior rather than one blanket retry.

error_classes:
  network:                # timeout, DNS, transient connection
    match: [timeout, "connection reset", "name resolution", "temporarily unavailable"]
    response: backoff_retry
    backoff: {base_seconds: 5, factor: 2, max_retries: 4}

  api_error:              # 5xx / unexpected API response
    match: ["500", "502", "503", "bad gateway", "server error"]
    response: backoff_retry
    backoff: {base_seconds: 10, factor: 2, max_retries: 3}

  rate_limit:             # 429 / secondary limits
    match: ["429", "rate limit", "secondary rate limit", "abuse detection"]
    response: queue_or_defer       # platform-specific backoff, defer to next window
    backoff: {base_seconds: 60, factor: 2, max_retries: 5}

  auth_failure:           # 401 / 403 invalid or expired credentials
    match: ["401", "bad credentials", "token", "forbidden"]
    response: flag_manual          # no blind retry; alert and stop this source
    alert: true

  not_found:              # 404; repo removed / private (often itself a signal)
    match: ["404", "not found"]
    response: skip_and_log
